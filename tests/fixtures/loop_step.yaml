# loop_step.yaml — Loop step iterating over a JSON list.
# Demonstrates: loop source file reading, iteration, and done transition.

name: "loop_step"
description: "Loop iterates over tasks from a JSON manifest"
begin: "prepare"

end_conditions:
  combinator: or
  conditions:
    - type: node_reached
      node: "all_done"
      result: "completed"

steps:
  - id: "prepare"
    step_type: "agent"
    agent_config: "echo_agent"
    output:
      mode: "content"
      fixed:
        manifest: { file: "tasks_manifest.json", format: '{"tasks": [task, ...], "execution_order": [[str, ...], ...]}' }
    transitions:
      - to: "task_iterator"

  - id: "task_iterator"
    step_type: "loop"
    loop:
      source:
        step: "prepare"
        file: "tasks_manifest.json"
        field: "execution_order"
      item_as: "current_task"
      max_iterations: 100
    transitions:
      - to: "process_task"
        max_loop: 100
      - to: "all_done"

  - id: "process_task"
    step_type: "agent"
    agent_config: "echo_agent"
    transitions:
      - to: "task_iterator"

  - id: "all_done"
    step_type: "agent"
    agent_config: "echo_agent"
