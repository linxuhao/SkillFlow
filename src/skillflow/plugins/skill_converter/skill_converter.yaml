# skill_converter.yaml — Meta-pipeline that converts a skill description into a skillflow YAML config.
# Uses the host LLM agent as the StepRunner for each agent step.

name: "skill_converter"
description: "Convert a skill description into a valid skillflow pipeline graph"
begin: "analyze_skill"

end_conditions:
  combinator: or
  conditions:
    - type: node_reached
      node: "done"
      result: "completed"

steps:
  - id: "analyze_skill"
    step_type: "agent"
    agent_config: "skill_analyst"
    context:
      - source: { config: "skill_converter", output: "skill_description.md" }
    output:
      mode: "content"
      fixed:
        analysis: { file: "skill_analysis.json", format: '{"phases": [str, ...], "decisions": [{condition: str, branches: [str, ...]}, ...], "terminal_condition": str, "tools_per_phase": {str: [str, ...]}, "checkpoints": [str, ...]}' }
    transitions:
      - to: "design_graph"

  - id: "design_graph"
    step_type: "agent"
    agent_config: "graph_designer"
    context:
      - source: { step: "analyze_skill" }
    output:
      mode: "content"
      fixed:
        pipeline: { file: "skill_pipeline.yaml", on_exists: "new" }
    transitions:
      - to: "validate_design"

  - id: "validate_design"
    step_type: "tool"
    tool_name: "skillflow_lint"
    tool_params:
      path: "$CONFIG_DIR/design_graph/skill_pipeline.yaml"
    transitions:
      - to: "done"
        match: { passed: true }
      - to: "fix_issues"
        match: { passed: false }
        max_loop: 3
        feedback: true

  - id: "fix_issues"
    step_type: "agent"
    agent_config: "graph_fixer"
    context:
      - source: { step: "design_graph" }
    output:
      mode: "content"
      fixed:
        pipeline: { file: "skill_pipeline.yaml", on_exists: "replace" }
    transitions:
      - to: "validate_fix"

  - id: "validate_fix"
    step_type: "tool"
    tool_name: "skillflow_lint"
    tool_params:
      path: "$CONFIG_DIR/fix_issues/skill_pipeline.yaml"
    transitions:
      - to: "done"
        match: { passed: true }
      - to: "fix_issues"
        match: { passed: false }
        max_loop: 3
        feedback: true

  - id: "done"
    step_type: "agent"
    agent_config: "skill_analyst"
