name: read_file
description: >
  Read a file from the project workspace. Searches in order:
  1) project root (committed/delivered files),
  2) step staging dir (files the agent just wrote via write_* tools),
  3) step output dir (files from previous retries of this step).
  Returns the file content with line numbers, and indicates which
  directory the file was found in ("found_in").
parameters:
  path:
    type: string
    description: "Relative path from project root (e.g. 'src/main.py')"
    required: true
  start_line:
    type: integer
    description: "0-indexed start line (optional, default 0)"
    required: false
  end_line:
    type: integer
    description: "Exclusive end line (optional, default end of file)"
    required: false
limits:
  max_lines: 300
  max_size_kb: 50
