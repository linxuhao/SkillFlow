name: web_search
description: >
  Search the web via SearXNG API. Returns structured results with titles,
  URLs, and snippets. Configurable via SEARXNG_URL env var (defaults to
  http://localhost:8888).
parameters:
  query:
    type: string
    description: "Search query string"
    required: true
  max_results:
    type: integer
    description: "Maximum results (1-10, default 5)"
    required: false
  language:
    type: string
    description: "Language code (auto, en, zh, etc., default auto)"
    required: false
